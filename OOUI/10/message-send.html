<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>メッセージ送信</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
</head>
<body class="min-h-screen bg-black">
    <div class="iphone-frame flex flex-col">
        <header class="app-header safe-top safe-x flex items-center justify-between px-4 bg-white border-b border-gray-200 shrink-0">
            <a href="customer-detail.html?id=U001" class="p-2 -ml-2 text-gray-600"><span class="material-icons">close</span></a>
            <h1 class="text-lg font-semibold text-gray-900">メッセージ送信</h1>
            <button type="button" id="sendBtn" class="p-2 text-blue-600 font-medium">送信</button>
        </header>

        <main class="flex-1 flex flex-col safe-x safe-bottom has-bottom-nav">
            <!-- 送信先 -->
            <div class="px-4 py-3 bg-white border-b border-gray-200 flex items-center gap-3">
                <img src="https://ui-avatars.com/api/?name=Yamada+Taro&size=40&background=3b82f6&color=fff" alt="" class="w-10 h-10 rounded-full object-cover">
                <div>
                    <div class="font-medium text-gray-900">山田太郎</div>
                    <div class="text-xs text-gray-500">株式会社山田食品</div>
                </div>
            </div>

            <!-- 本文 -->
            <div class="flex-1 p-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">メッセージ</label>
                <textarea id="messageBody" rows="8" placeholder="メッセージを入力してください" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none"></textarea>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="company-list.html"><span class="material-icons">business</span>企業</a>
            <a href="customer-list.html" class="active"><span class="material-icons">people</span>顧客</a>
            <a href="case-list.html"><span class="material-icons">folder</span>案件</a>
            <a href="material-list.html"><span class="material-icons">description</span>資料</a>
            <a href="schedule-list.html"><span class="material-icons">event</span>予定</a>
        </nav>
    </div>
    <script>
        document.getElementById('sendBtn').addEventListener('click', function() {
            var body = document.getElementById('messageBody').value.trim();
            if (!body) { alert('メッセージを入力してください'); return; }
            alert('送信しました');
            var to = new URLSearchParams(location.search).get('to') || 'U001';
            location.href = 'customer-detail.html?id=' + encodeURIComponent(to);
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="screenshot.js"></script>
</body>
</html>
