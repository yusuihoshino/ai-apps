<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>顧客情報編集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
</head>
<body class="min-h-screen bg-black">
    <div class="iphone-frame flex flex-col">
        <header class="app-header safe-top safe-x flex items-center justify-between px-4 bg-white border-b border-gray-200 shrink-0">
            <a href="customer-detail.html?id=U001" class="p-2 -ml-2 text-gray-600"><span class="material-icons">close</span></a>
            <h1 class="text-lg font-semibold text-gray-900">顧客情報編集</h1>
            <button type="button" id="saveCustomerBtn" class="p-2 text-blue-600 font-medium">保存</button>
        </header>

        <main class="flex-1 overflow-y-auto safe-x safe-bottom has-bottom-nav px-4 py-6">
            <!-- 写真 -->
            <div class="flex flex-col items-center mb-6">
                <img src="https://ui-avatars.com/api/?name=Yamada+Taro&size=96&background=3b82f6&color=fff" alt="" id="customerPhoto" class="w-24 h-24 rounded-full object-cover mb-2">
                <button type="button" class="text-sm text-blue-600">写真を変更</button>
            </div>

            <form id="customerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">名前</label>
                    <input type="text" name="name" value="山田太郎" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">電話番号</label>
                    <input type="tel" name="tel" value="090-1234-5678" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">所属企業</label>
                    <input type="text" name="company" value="株式会社山田食品" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">メモ</label>
                    <textarea name="memo" rows="4" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="メモを入力">担当：営業部。連絡は平日9–18時が望ましい。次回打ち合わせは3月を希望。</textarea>
                </div>
            </form>
        </main>

        <nav class="bottom-nav">
            <a href="company-list.html"><span class="material-icons">business</span>企業</a>
            <a href="customer-list.html" class="active"><span class="material-icons">people</span>顧客</a>
            <a href="case-list.html"><span class="material-icons">folder</span>案件</a>
            <a href="material-list.html"><span class="material-icons">description</span>資料</a>
            <a href="schedule-list.html"><span class="material-icons">event</span>予定</a>
        </nav>
    </div>
    <script>
        document.getElementById('saveCustomerBtn').addEventListener('click', function() {
            alert('保存しました');
            var id = new URLSearchParams(location.search).get('id') || 'U001';
            location.href = 'customer-detail.html?id=' + encodeURIComponent(id);
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="screenshot.js"></script>
</body>
</html>
