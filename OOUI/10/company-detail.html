<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>企業詳細</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
</head>
<body class="min-h-screen bg-black">
    <div class="iphone-frame flex flex-col">
        <header class="app-header safe-top safe-x flex items-center justify-between px-4 bg-white border-b border-gray-200 shrink-0">
            <a href="company-list.html" class="p-2 -ml-2 text-gray-600"><span class="material-icons">arrow_back</span></a>
            <h1 class="text-lg font-semibold text-gray-900">企業詳細</h1>
            <a href="company-edit.html?id=C001" class="p-2 text-gray-600"><span class="material-icons">edit</span></a>
        </header>

        <main class="flex-1 overflow-y-auto safe-x safe-bottom has-bottom-nav">
            <div class="px-4 py-6 bg-white border-b border-gray-200">
                <h2 class="text-xl font-bold text-gray-900 mb-4">株式会社山田食品</h2>
                <dl class="space-y-3 text-sm">
                    <div class="flex gap-3">
                        <dt class="text-gray-500 w-20 shrink-0">ID</dt>
                        <dd class="text-gray-900">C001</dd>
                    </div>
                    <div class="flex gap-3">
                        <dt class="text-gray-500 w-20 shrink-0">住所</dt>
                        <dd class="text-gray-900">〒150-0043 東京都渋谷区道玄坂1-2-3 山田ビル5F</dd>
                    </div>
                    <div class="flex gap-3">
                        <dt class="text-gray-500 w-20 shrink-0">電話</dt>
                        <dd class="text-gray-900"><a href="tel:0312345678" class="text-blue-600">03-1234-5678</a></dd>
                    </div>
                    <div class="flex gap-3">
                        <dt class="text-gray-500 w-20 shrink-0">メール</dt>
                        <dd class="text-gray-900"><a href="mailto:info@yamada-food.co.jp" class="text-blue-600">info@yamada-food.co.jp</a></dd>
                    </div>
                    <div class="flex gap-3">
                        <dt class="text-gray-500 w-20 shrink-0">HP</dt>
                        <dd class="text-gray-900"><a href="https://yamada-food.co.jp" target="_blank" rel="noopener" class="text-blue-600 underline">https://yamada-food.co.jp</a></dd>
                    </div>
                </dl>
            </div>

            <!-- 顧客一覧（セクション） -->
            <section class="px-4 py-4">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-sm font-semibold text-gray-700">顧客一覧</h3>
                    <a href="customer-edit.html" class="p-1.5 text-blue-600 rounded-full hover:bg-blue-50" aria-label="追加"><span class="material-icons">add</span></a>
                </div>
                <ul class="space-y-2" id="companyCustomerList">
                    <li class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                        <div class="flex items-center gap-3 p-3">
                            <a href="customer-detail.html?id=U001" class="flex-1 flex items-center gap-3 min-w-0 active:opacity-80">
                                <img src="https://ui-avatars.com/api/?name=Yamada+Taro&size=48&background=e5e7eb" alt="" class="w-12 h-12 rounded-full object-cover shrink-0">
                                <div class="min-w-0">
                                    <div class="font-medium text-gray-900">山田太郎</div>
                                    <div class="text-sm text-gray-500">株式会社山田食品</div>
                                </div>
                            </a>
                            <button type="button" class="company-customer-menu-btn p-2 text-gray-400 hover:text-gray-600 rounded-full" data-id="U001" aria-label="メニュー"><span class="material-icons">more_vert</span></button>
                        </div>
                    </li>
                    <li class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                        <div class="flex items-center gap-3 p-3">
                            <a href="customer-detail.html?id=U002" class="flex-1 flex items-center gap-3 min-w-0 active:opacity-80">
                                <img src="https://ui-avatars.com/api/?name=Suzuki+Hanako&size=48&background=e5e7eb" alt="" class="w-12 h-12 rounded-full object-cover shrink-0">
                                <div class="min-w-0">
                                    <div class="font-medium text-gray-900">鈴木花子</div>
                                    <div class="text-sm text-gray-500">株式会社山田食品</div>
                                </div>
                            </a>
                            <button type="button" class="company-customer-menu-btn p-2 text-gray-400 hover:text-gray-600 rounded-full" data-id="U002" aria-label="メニュー"><span class="material-icons">more_vert</span></button>
                        </div>
                    </li>
                </ul>
                <div id="companyCustomerMenuDropdown" class="fixed hidden z-30 bg-white rounded-lg shadow-lg border border-gray-200 py-1 min-w-[140px]" style="left:0;top:0;">
                    <a href="#" id="companyCustomerMenuEdit" class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100"><span class="material-icons text-lg">edit</span>編集</a>
                    <button type="button" id="companyCustomerMenuDelete" class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50"><span class="material-icons text-lg">delete</span>削除</button>
                </div>
                <div id="companyCustomerMenuBackdrop" class="fixed inset-0 z-20 hidden" aria-hidden="true"></div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="company-list.html" class="active"><span class="material-icons">business</span>企業</a>
            <a href="customer-list.html"><span class="material-icons">people</span>顧客</a>
            <a href="case-list.html"><span class="material-icons">folder</span>案件</a>
            <a href="material-list.html"><span class="material-icons">description</span>資料</a>
            <a href="schedule-list.html"><span class="material-icons">event</span>予定</a>
        </nav>
    </div>
    <script>
        (function() {
            var list = document.getElementById('companyCustomerList');
            var dropdown = document.getElementById('companyCustomerMenuDropdown');
            var backdrop = document.getElementById('companyCustomerMenuBackdrop');
            var editLink = document.getElementById('companyCustomerMenuEdit');
            var deleteBtn = document.getElementById('companyCustomerMenuDelete');
            var currentId = null;
            function openMenu(id, btn) {
                currentId = id;
                var r = btn.getBoundingClientRect();
                dropdown.style.left = (r.right - 140) + 'px';
                dropdown.style.top = (r.bottom + 4) + 'px';
                dropdown.classList.remove('hidden');
                backdrop.classList.remove('hidden');
            }
            function closeMenu() {
                dropdown.classList.add('hidden');
                backdrop.classList.add('hidden');
                currentId = null;
            }
            if (list) list.addEventListener('click', function(e) {
                var btn = e.target.closest('.company-customer-menu-btn');
                if (btn) { e.preventDefault(); openMenu(btn.getAttribute('data-id'), btn); }
            });
            if (backdrop) backdrop.addEventListener('click', closeMenu);
            if (editLink) editLink.addEventListener('click', function(e) { e.preventDefault(); if (currentId) location.href = 'customer-edit.html?id=' + encodeURIComponent(currentId); closeMenu(); });
            if (deleteBtn) deleteBtn.addEventListener('click', function() { if (currentId && confirm('この顧客を削除しますか？')) closeMenu(); });
        })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="screenshot.js"></script>
</body>
</html>
