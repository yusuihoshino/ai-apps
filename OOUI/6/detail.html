            </div>

        <!-- 仕入れ詳細 -->

            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                <h2 class="text-xl font-semibold text-gray-900 mb-4">商品一覧</h2>
                <div class="overflow-x-auto">
                    <div class="min-w-[600px]">

                                </tr>
                            </thead>

                                <!-- JavaScriptで動的に生成 -->

                    </div>
                </div>

        </div>

        <!-- 商品詳細 -->

            return new Intl.NumberFormat('ja-JP').format(amount);

        // 日付を日本語表示形式にフォーマット
        function formatDateDisplay(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${year}年${month}月${day}日`;
        }

        // 直近の仕入れリストを表示
        function renderPurchaseHistory(productName) {
            // 仕入れデータを取得（常に最新のサンプルデータを使用）
            let purchases = JSON.parse(localStorage.getItem('purchases') || '[]');
            
            // サンプルデータに新しい仕入れが含まれているか確認し、含まれていない場合は更新
            const hasNewPurchases = purchases.some(p => p.id === 'P013' || p.id === 'P014' || p.id === 'P015' || p.id === 'P016' || p.id === 'P017');
            if (purchases.length === 0 || !hasNewPurchases) {
                // 既存のデータと新しいデータをマージ（重複を避ける）
                const existingIds = new Set(purchases.map(p => p.id));
                const newPurchases = samplePurchases.filter(p => !existingIds.has(p.id));
                purchases = [...purchases, ...newPurchases];
                // 日付順にソート
                purchases.sort((a, b) => new Date(b.date) - new Date(a.date));
                localStorage.setItem('purchases', JSON.stringify(purchases));
            }

            // 該当商品の仕入れ履歴を取得
            const history = [];
            purchases.forEach(purchase => {
                if (purchase.items && Array.isArray(purchase.items)) {
                    purchase.items.forEach(item => {
                        if (item && item.name === productName) {
                            history.push({
                                purchaseId: purchase.id,
                                date: purchase.date,
                                quantity: item.quantity,
                                price: item.price
                            });
                        }
                    });
                }
            });

            // 日付順（新しい順）にソート
            history.sort((a, b) => new Date(b.date) - new Date(a.date));

            const tbody = document.getElementById('purchaseHistoryBody');
            tbody.innerHTML = '';

            if (history.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="4" class="px-4 py-8 text-center text-gray-500">仕入れ履歴がありません</td>';
                tbody.appendChild(row);
                return;
            }

            // 最新の5件のみ表示
            const recentHistory = history.slice(0, 5);

            recentHistory.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 cursor-pointer transition-colors';
                
                row.innerHTML = `
                    <td class="px-4 py-3 text-sm text-gray-900">${item.purchaseId}</td>
                    <td class="px-4 py-3 text-sm text-gray-900">${formatDateDisplay(item.date)}</td>
                    <td class="px-4 py-3 text-sm text-gray-900">${item.quantity}個</td>
                    <td class="px-4 py-3 text-sm text-gray-900">¥${formatCurrency(item.price)}</td>
                `;

                // クリックで仕入れ詳細ページに移動
                row.addEventListener('click', () => {
                    window.location.href = `detail.html?id=${item.purchaseId}`;
                });

                tbody.appendChild(row);
            });
        }

        // 初期化
        if (purchaseId) {
            // 仕入れ詳細を表示
            document.getElementById('backLink').href = 'index.html';
            document.getElementById('purchaseDetail').classList.remove('hidden');
            renderPurchaseDetail();
        } else if (productId) {
            // 商品詳細を表示
            document.getElementById('pageTitle').textContent = '商品詳細';
            document.getElementById('backLink').href = 'product-list.html';
            document.getElementById('productDetail').classList.remove('hidden');
            renderProductDetail();
        }
    </script>
</body>
</html>
