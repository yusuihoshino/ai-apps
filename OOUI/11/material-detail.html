<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資材詳細 - イベント管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- サイドバー -->
        <div class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0">
            <div class="p-4 border-b border-gray-200">
                <h1 class="text-xl font-bold text-gray-900">イベント管理</h1>
            </div>
            <nav class="flex-1 p-4">
                <a href="event-list.html" class="flex items-center gap-3 px-4 py-3 mb-2 font-semibold text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors">
                    <span class="material-icons">event</span>
                    <span>イベント</span>
                </a>
                <a href="material-list.html" class="flex items-center gap-3 px-4 py-3 mb-2 font-semibold text-gray-900 bg-blue-50 text-blue-600 rounded-lg transition-colors">
                    <span class="material-icons">inventory_2</span>
                    <span>資材</span>
                </a>
            </nav>
        </div>

        <!-- メインコンテンツ -->
        <div class="flex-1 overflow-y-auto">
            <div class="container mx-auto px-4 py-8">
                <div class="mb-6">
                    <a href="material-list.html" class="inline-flex items-center gap-1 text-gray-600 hover:text-blue-600 text-sm font-medium">
                        <span class="material-icons text-lg">arrow_back</span>一覧に戻る
                    </a>
                </div>

                <!-- 資材：見出しは表の外、その下に白背景の表 -->
                <div class="mb-8">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-lg font-semibold text-gray-900">資材</h2>
                        <div class="flex items-center gap-2">
                            <a href="material-detail.html" class="inline-flex items-center justify-center h-10 px-4 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">編集</a>
                            <button type="button" class="inline-flex items-center justify-center h-10 px-4 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700">削除</button>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                        <table class="w-full">
                            <tbody class="divide-y divide-gray-200">
                                <tr><td class="px-6 py-3 text-sm font-medium text-gray-500 w-40">資材</td><td class="px-6 py-3 text-sm text-gray-900">プロジェクター（M001）</td></tr>
                                <tr><td class="px-6 py-3 text-sm font-medium text-gray-500 w-40">金額</td><td class="px-6 py-3 text-sm text-gray-900">¥120,000</td></tr>
                                <tr><td class="px-6 py-3 text-sm font-medium text-gray-500 w-40">納入日</td><td class="px-6 py-3 text-sm text-gray-900">2025-03-10</td></tr>
                                <tr><td class="px-6 py-3 text-sm font-medium text-gray-500 w-40">メーカー</td><td class="px-6 py-3 text-sm text-gray-900">日本電機</td></tr>
                                <tr><td class="px-6 py-3 text-sm font-medium text-gray-500 w-40">担当者</td><td class="px-6 py-3 text-sm text-gray-900">山田太郎</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- イベント：見出しは表の外、右端に新規追加、その下に白背景の表（イベント一覧と同じ表示形式） -->
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-lg font-semibold text-gray-900">イベント</h2>
                        <a href="event-detail.html" class="inline-flex items-center justify-center gap-1.5 h-10 px-4 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">
                            <span class="material-icons text-lg">add</span>新規追加
                        </a>
                    </div>
                    <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-gray-900">イベント</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-gray-900">会場</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-gray-900">開始日</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-gray-900">終了日</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-gray-900">主催者</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold text-gray-900">カテゴリー</th>
                                    <th class="px-4 py-3 text-right text-sm font-semibold text-gray-900 w-32">操作</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                <tr class="hover:bg-gray-50 cursor-pointer" onclick="location.href='event-detail.html?id=E001'">
                                    <td class="px-4 py-3 text-sm text-gray-900">技術カンファレンス 2025</td>
                                    <td class="px-4 py-3 text-sm text-gray-900">東京国際フォーラム</td>
                                    <td class="px-4 py-3 text-sm text-gray-900">2025-03-15 9:00</td>
                                    <td class="px-4 py-3 text-sm text-gray-900">2025-03-15 18:00</td>
                                    <td class="px-4 py-3 text-sm text-gray-900">テック</td>
                                    <td class="px-4 py-3"><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-50 text-blue-900">技術</span></td>
                                    <td class="px-4 py-3 text-right" onclick="event.stopPropagation()">
                                        <div class="flex flex-row items-center justify-end gap-1 flex-nowrap">
                                            <a href="event-detail.html?id=E001" class="inline-flex items-center px-2.5 py-1 text-xs font-medium text-white bg-blue-600 rounded hover:bg-blue-700 whitespace-nowrap">編集</a>
                                            <button type="button" class="inline-flex items-center px-2.5 py-1 text-xs font-medium text-white bg-red-600 rounded hover:bg-red-700 whitespace-nowrap">削除</button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
