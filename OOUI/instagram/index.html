<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagramサイズの四角</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .frame {
            width: min(90vw, 90vh);
            aspect-ratio: 1 / 1; /* Instagram正方形 (例: 1080x1080) */
            border: 2px solid #111827;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
        }
    </style>
</head>
<body>
    <div class="frame"></div>
</body>
</html>
