    </main>
    <script>
        (function() {
            var container = document.getElementById('class-cards');
            container.querySelectorAll('.class-card-menu-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var menu = this.nextElementSibling;
                    container.querySelectorAll('.class-card-menu').forEach(function(m) { if (m !== menu) m.classList.add('hidden'); });
                    menu.classList.toggle('hidden');
                });
            });
            document.addEventListener('click', function() {
                container.querySelectorAll('.class-card-menu').forEach(function(el) { el.classList.add('hidden'); });
            });
            var searchEl = document.getElementById('search');
            if (searchEl) {
                searchEl.addEventListener('input', function() {
                    var q = this.value.trim().toLowerCase();
                    container.querySelectorAll('[data-name]').forEach(function(card) {
                        var text = (card.getAttribute('data-name') || '').toLowerCase();
                        card.style.display = !q || text.indexOf(q) >= 0 ? '' : 'none';
                    });
                });
            }
        })();
    </script>
</body>
