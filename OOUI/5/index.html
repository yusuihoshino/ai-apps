<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公園の遊具検索</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- メインコンテンツ -->
        <div class="flex-1 overflow-y-auto">
            <div class="container mx-auto px-4 py-8">
                <!-- 検索バー -->
                <div class="mb-4">
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="地名または公園名で検索"
                        class="w-full max-w-md px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                </div>

                <!-- タグフィルター -->
                <div class="mb-6">
                    <div id="tagFilters" class="flex flex-wrap gap-6">
                        <!-- JavaScriptで動的に生成 -->
                    </div>
                </div>

                <!-- マップ -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
                    <div class="relative bg-gray-100 rounded-lg overflow-hidden" style="height: 500px;">
                        <!-- 地図上の公園（2x2配置） -->
                        <svg class="w-full h-full" viewBox="0 0 800 500">
                            <!-- 公園1（左上） -->
                            <g class="cursor-pointer" data-park-id="1">
                                <circle cx="200" cy="125" r="8" fill="#2563eb" class="hover:fill-#1d4ed8 transition-colors"/>
                                <text x="200" y="160" text-anchor="middle" class="text-sm font-semibold fill-gray-800 pointer-events-none">公園A</text>
                            </g>
                            
                            <!-- 公園2（右上） -->
                            <g class="cursor-pointer" data-park-id="2">
                                <circle cx="600" cy="125" r="8" fill="#2563eb" class="hover:fill-#1d4ed8 transition-colors"/>
                                <text x="600" y="160" text-anchor="middle" class="text-sm font-semibold fill-gray-800 pointer-events-none">公園B</text>
                            </g>
                            
                            <!-- 公園3（左下） -->
                            <g class="cursor-pointer" data-park-id="3">
                                <circle cx="200" cy="375" r="8" fill="#2563eb" class="hover:fill-#1d4ed8 transition-colors"/>
                                <text x="200" y="410" text-anchor="middle" class="text-sm font-semibold fill-gray-800 pointer-events-none">公園C</text>
                            </g>
                            
                            <!-- 公園4（右下） -->
                            <g class="cursor-pointer" data-park-id="4">
                                <circle cx="600" cy="375" r="8" fill="#2563eb" class="hover:fill-#1d4ed8 transition-colors"/>
                                <text x="600" y="410" text-anchor="middle" class="text-sm font-semibold fill-gray-800 pointer-events-none">公園D</text>
                            </g>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右サイドバー -->
        <div id="sidebar" class="w-96 bg-white border-l border-gray-200 overflow-y-auto">
            <div class="p-6">
                <!-- 検索結果セクション -->
                <div id="searchResultsSection" class="mb-6">
                    <h2 class="text-xl font-semibold text-gray-900 mb-4">検索結果</h2>
                    <div id="searchResults" class="space-y-3">
                        <!-- JavaScriptで動的に生成 -->
                    </div>
                </div>

                <!-- 公園詳細セクション -->
                <div id="parkDetailSection" class="hidden">
                    <!-- 戻るボタン -->
                    <button id="backToResults" class="mb-4 text-blue-600 hover:text-blue-700 transition-colors flex items-center gap-2">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                        <span>戻る</span>
                    </button>
                    
                    <h2 id="sidebarParkName" class="text-4xl font-bold text-gray-900 mb-6">公園詳細</h2>

                    <!-- 公園情報 -->
                    <div class="mb-6">
                        <p id="sidebarParkAddress" class="text-lg text-gray-900 mb-4"></p>
                        
                        <!-- 公園画像 -->
                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-gray-200 rounded-lg aspect-square flex items-center justify-center">
                                <svg class="w-16 h-16 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                            </div>
                            <div class="bg-gray-200 rounded-lg aspect-square flex items-center justify-center">
                                <svg class="w-16 h-16 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                            </div>
                            <div class="bg-gray-200 rounded-lg aspect-square flex items-center justify-center">
                                <svg class="w-16 h-16 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                            </div>
                            <div class="bg-gray-200 rounded-lg aspect-square flex items-center justify-center">
                                <svg class="w-16 h-16 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- 遊具一覧 -->
                    <div>
                        <div id="sidebarPlaygroundList" class="space-y-4">
                            <!-- JavaScriptで動的に生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 公園データ
        const parks = {
            1: {
                id: 1,
                name: '公園A',
                address: '東京都渋谷区1-1-1',
                area: '5,000㎡',
                facilities: ['トイレ', '駐車場', 'ベンチ'],
                playgrounds: [
                    { id: 1, name: 'ブランコ', type: 'swing', area: 'エリアA' },
                    { id: 2, name: '滑り台', type: 'slide', area: 'エリアB' },
                    { id: 3, name: 'ジャングルジム', type: 'jungle-gym', area: 'エリアC' }
                ]
            },
            2: {
                id: 2,
                name: '公園B',
                address: '東京都新宿区2-2-2',
                area: '3,000㎡',
                facilities: ['トイレ', 'ベンチ'],
                playgrounds: [
                    { id: 4, name: 'ブランコ', type: 'swing', area: 'エリアA' },
                    { id: 5, name: 'シーソー', type: 'seesaw', area: 'エリアB' }
                ]
            },
            3: {
                id: 3,
                name: '公園C',
                address: '東京都港区3-3-3',
                area: '7,000㎡',
                facilities: ['トイレ', '駐車場', 'ベンチ', '売店'],
                playgrounds: [
                    { id: 6, name: '滑り台', type: 'slide', area: 'エリアA' },
                    { id: 7, name: 'ブランコ', type: 'swing', area: 'エリアB' },
                    { id: 8, name: '鉄棒', type: 'horizontal-bar', area: 'エリアC' }
                ]
            },
            4: {
                id: 4,
                name: '公園D',
                address: '東京都世田谷区4-4-4',
                area: '4,000㎡',
                facilities: ['トイレ', 'ベンチ'],
                playgrounds: [
                    { id: 9, name: 'ブランコ', type: 'swing', area: 'エリアA' },
                    { id: 10, name: 'ジャングルジム', type: 'jungle-gym', area: 'エリアB' }
                ]
            }
        };

        // 検索結果に戻る
        document.getElementById('backToResults').addEventListener('click', () => {
            document.getElementById('parkDetailSection').classList.add('hidden');
            document.getElementById('searchResultsSection').classList.remove('hidden');
        });

        // 公園詳細をサイドバーに表示
        function showParkDetail(parkId) {
            const park = parks[parkId];
            if (!park) return;

            // 検索結果セクションを非表示、公園詳細セクションを表示
            document.getElementById('searchResultsSection').classList.add('hidden');
            document.getElementById('parkDetailSection').classList.remove('hidden');

            // 公園情報を表示
            document.getElementById('sidebarParkName').textContent = park.name;
            document.getElementById('sidebarParkAddress').textContent = park.address;

            // 遊具を表示
            const playgroundList = document.getElementById('sidebarPlaygroundList');
            playgroundList.innerHTML = '';
            park.playgrounds.forEach((playground, index) => {
                const item = document.createElement('div');
                item.className = 'py-4 border-t border-gray-200';
                if (index === 0) {
                    item.className = 'py-4 border-t border-b border-gray-200';
                }
                
                // 遊具見出しと詳細アイコン
                const titleContainer = document.createElement('div');
                titleContainer.className = 'flex items-center gap-2 mb-2';
                
                const title = document.createElement('div');
                title.className = 'text-xl font-semibold text-gray-900';
                title.textContent = playground.name;
                titleContainer.appendChild(title);
                
                const detailLink = document.createElement('a');
                detailLink.href = `playground-detail.html?parkId=${parkId}&playgroundId=1&type=swing`; // 一旦全てブランコへのリンク
                detailLink.className = 'text-gray-400 hover:text-gray-600 flex items-center justify-center';
                detailLink.innerHTML = `
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                `;
                titleContainer.appendChild(detailLink);
                
                item.appendChild(titleContainer);
                
                // 遊具配置場所
                const area = document.createElement('div');
                area.className = 'text-sm text-gray-600';
                area.textContent = `配置場所: ${playground.area}`;
                item.appendChild(area);
                
                playgroundList.appendChild(item);
            });
        }

        // 公園をクリック
        document.querySelectorAll('[data-park-id]').forEach(element => {
            element.addEventListener('click', (e) => {
                const parkId = parseInt(e.currentTarget.getAttribute('data-park-id'));
                showParkDetail(parkId);
            });
        });

        // 検索とタグフィルター
        let selectedTags = [];
        let searchQuery = '';

        // 検索バーのイベント
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderSearchResults();
        });

        // 初期化時にタグフィルターと検索結果を表示
        renderTagFilters();
        renderSearchResults();

        // 全遊具名を取得（タグとして使用）
        function getAllTags() {
            const playgroundNames = new Set();
            Object.values(parks).forEach(park => {
                park.playgrounds.forEach(playground => {
                    playgroundNames.add(playground.name);
                });
            });
            return Array.from(playgroundNames).sort();
        }

        // タグフィルターを表示（チェックボックス）
        function renderTagFilters() {
            const tags = getAllTags();
            const tagFiltersDiv = document.getElementById('tagFilters');
            tagFiltersDiv.innerHTML = '';

            tags.forEach(tag => {
                const container = document.createElement('div');
                container.className = 'flex items-center gap-1';
                
                const label = document.createElement('label');
                label.className = 'flex items-center gap-1 cursor-pointer';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = tag;
                checkbox.checked = selectedTags.includes(tag);
                checkbox.className = 'w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500';
                checkbox.addEventListener('change', () => {
                    if (checkbox.checked) {
                        if (!selectedTags.includes(tag)) {
                            selectedTags.push(tag);
                        }
                    } else {
                        selectedTags = selectedTags.filter(t => t !== tag);
                    }
                    renderSearchResults();
                });
                
                const span = document.createElement('span');
                span.className = 'text-base text-gray-700';
                span.textContent = tag;
                
                label.appendChild(checkbox);
                label.appendChild(span);
                container.appendChild(label);
                
                const detailLink = document.createElement('a');
                detailLink.href = `playground-detail.html?parkId=1&playgroundId=1&type=swing`; // 一旦全てブランコへのリンク
                detailLink.className = 'text-gray-400 hover:text-gray-600 flex items-center';
                detailLink.innerHTML = `
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                `;
                container.appendChild(detailLink);
                
                tagFiltersDiv.appendChild(container);
            });
        }

        // 検索結果を表示
        function renderSearchResults() {
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '';

            // 検索結果セクションを常に表示
            document.getElementById('searchResultsSection').classList.remove('hidden');
            document.getElementById('parkDetailSection').classList.add('hidden');

            // 全遊具を取得
            const allPlaygrounds = [];
            Object.values(parks).forEach(park => {
                park.playgrounds.forEach(playground => {
                    allPlaygrounds.push({
                        ...playground,
                        parkId: park.id,
                        parkName: park.name,
                        parkAddress: park.address
                    });
                });
            });

            // 検索クエリでフィルタリング（公園名または地名）
            let filteredPlaygrounds = allPlaygrounds;
            if (searchQuery) {
                filteredPlaygrounds = filteredPlaygrounds.filter(playground => {
                    return playground.parkName.toLowerCase().includes(searchQuery) ||
                           playground.parkAddress.toLowerCase().includes(searchQuery) ||
                           playground.name.toLowerCase().includes(searchQuery);
                });
            }

            // タグ（遊具名）でフィルタリング
            if (selectedTags.length > 0) {
                filteredPlaygrounds = filteredPlaygrounds.filter(playground => {
                    return selectedTags.includes(playground.name);
                });
            }

            if (filteredPlaygrounds.length === 0) {
                resultsDiv.innerHTML = '<p class="text-gray-500 text-center py-8">該当する遊具が見つかりません</p>';
                return;
            }

            // 公園ごとにグループ化
            const parksMap = new Map();
            filteredPlaygrounds.forEach(playground => {
                const parkKey = playground.parkId;
                if (!parksMap.has(parkKey)) {
                    parksMap.set(parkKey, {
                        parkId: playground.parkId,
                        parkName: playground.parkName,
                        parkAddress: playground.parkAddress,
                        playgrounds: []
                    });
                }
                parksMap.get(parkKey).playgrounds.push(playground);
            });

            // 公園ごとに表示
            parksMap.forEach(parkData => {
                const item = document.createElement('div');
                item.className = 'border border-gray-200 rounded-lg p-4 mb-4 hover:bg-gray-50 transition-colors cursor-pointer';
                item.addEventListener('click', () => {
                    showParkDetail(parkData.parkId);
                });
                
                // 公園名（大きく）
                const parkName = document.createElement('div');
                parkName.className = 'text-2xl font-bold text-gray-900 mb-2';
                parkName.textContent = parkData.parkName;
                item.appendChild(parkName);
                
                // 住所（現在のサイズ）
                const address = document.createElement('div');
                address.className = 'text-sm text-gray-600 mb-3';
                address.textContent = parkData.parkAddress;
                item.appendChild(address);
                
                // 遊具タグ
                const tagsDiv = document.createElement('div');
                tagsDiv.className = 'flex flex-wrap gap-2';
                parkData.playgrounds.forEach(playground => {
                    const tag = document.createElement('span');
                    tag.className = 'px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-base';
                    tag.textContent = playground.name;
                    tagsDiv.appendChild(tag);
                });
                item.appendChild(tagsDiv);
                
                resultsDiv.appendChild(item);
            });
        }
    </script>
</body>
</html>
