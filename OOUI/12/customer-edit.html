<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客 - 管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-white min-h-screen">
    <header class="bg-white border-b border-gray-300 py-3">
        <div class="container mx-auto px-8">
            <nav class="inline-flex rounded-2xl bg-white p-1 gap-0.5">
                <a href="customer-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl text-gray-600 text-sm font-medium hover:bg-gray-100">顧客</a>
                <a href="contract-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl text-gray-600 text-sm font-medium hover:bg-gray-100">契約</a>
                <a href="incident-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl text-gray-600 text-sm font-medium hover:bg-gray-100">事故</a>
                <a href="application-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl text-gray-600 text-sm font-medium hover:bg-gray-100">申し込み</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-8 py-8">
        <a href="customer-list.html" class="inline-flex items-center gap-1 text-xs text-black hover:opacity-70 mb-2" aria-label="一覧に戻る">
            <span class="material-icons text-base">arrow_back</span>
            <span>一覧に戻る</span>
        </a>
        <h1 class="text-lg font-bold text-black mb-4" id="page-title">顧客 新規作成</h1>
        <div id="not-found" class="hidden py-12 text-center">
            <p class="font-medium text-black">顧客が見つかりません。</p>
            <a href="customer-list.html" class="inline-block mt-4 font-bold text-black hover:underline">一覧に戻る</a>
        </div>
        <form id="form" class="max-w-xl space-y-4 py-4">
            <div>
                <label class="block text-sm font-bold text-black mb-1">顧客名・会社名</label>
                <input type="text" name="name" class="w-full px-4 py-2.5 border-2 border-gray-300 rounded-2xl bg-white text-black font-medium focus:ring-2 focus:ring-black focus:border-black" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-black mb-1">担当者</label>
                <input type="text" name="contact" class="w-full px-4 py-2.5 border-2 border-gray-300 rounded-2xl bg-white text-black font-medium focus:ring-2 focus:ring-black focus:border-black">
            </div>
            <div>
                <label class="block text-sm font-bold text-black mb-1">電話番号</label>
                <input type="text" name="phone" class="w-full px-4 py-2.5 border-2 border-gray-300 rounded-2xl bg-white text-black font-medium focus:ring-2 focus:ring-black focus:border-black">
            </div>
            <div>
                <label class="block text-sm font-bold text-black mb-1">メールアドレス</label>
                <input type="email" name="email" class="w-full px-4 py-2.5 border-2 border-gray-300 rounded-2xl bg-white text-black font-medium focus:ring-2 focus:ring-black focus:border-black">
            </div>
            <div>
                <label class="block text-sm font-bold text-black mb-1">住所</label>
                <input type="text" name="address" class="w-full px-4 py-2.5 border-2 border-gray-300 rounded-2xl bg-white text-black font-medium focus:ring-2 focus:ring-black focus:border-black">
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-gray-300">
                <button type="button" id="btn-delete" class="hidden inline-flex items-center justify-center gap-2 h-10 px-4 border-2 border-gray-400 rounded-2xl bg-white text-sm font-bold text-black hover:bg-gray-100">削除</button>
                <button type="submit" class="inline-flex items-center justify-center gap-2 h-10 px-6 bg-black text-white rounded-2xl text-sm font-bold hover:bg-gray-800">保存</button>
            </div>
        </form>
    </main>

    <script>
        (function() {
            var STORAGE_DELETED = 'customer_deleted';
            var STORAGE_UPDATED = 'customer_updated';
            var baseList = [
                { id: 'CU001', name: '株式会社山田商事', contact: '山田 太郎', phone: '03-1234-5678', email: 'yamada@example.co.jp', address: '東京都中央区〇〇1-2-3', date: '2024-04-01' },
                { id: 'CU002', name: '佐藤工業株式会社', contact: '佐藤 花子', phone: '06-9876-5432', email: 'sato@sato-kogyo.co.jp', address: '大阪府大阪市△△4-5-6', date: '2024-06-15' },
                { id: 'CU003', name: '有限会社鈴木製作所', contact: '鈴木 一郎', phone: '052-111-2222', email: 'suzuki@mfg.jp', address: '愛知県名古屋市□□7-8-9', date: '2024-10-01' }
            ];

            var id = (location.search.match(/[?&]id=([^&]+)/) || [])[1] ? decodeURIComponent((location.search.match(/[?&]id=([^&]+)/) || [])[1]) : '';
            function getDeleted() { try { return JSON.parse(sessionStorage.getItem(STORAGE_DELETED) || '[]'); } catch (e) { return []; } }
            function getUpdated() { try { return JSON.parse(sessionStorage.getItem(STORAGE_UPDATED) || '{}'); } catch (e) { return {}; } }
            function getRecord() {
                if (!id || getDeleted().indexOf(id) >= 0) return null;
                var updated = getUpdated();
                var r = baseList.filter(function(x) { return x.id === id; })[0];
                return r ? (updated[id] || r) : null;
            }

            var form = document.getElementById('form');
            var notFound = document.getElementById('not-found');
            var pageTitle = document.getElementById('page-title');
            var btnDelete = document.getElementById('btn-delete');
            var record = getRecord();

            if (id && !record) {
                notFound.classList.remove('hidden');
                form.classList.add('hidden');
            } else {
                if (record) {
                    pageTitle.textContent = '顧客 編集';
                    form.querySelector('[name="name"]').value = record.name || '';
                    form.querySelector('[name="contact"]').value = record.contact || '';
                    form.querySelector('[name="phone"]').value = record.phone || '';
                    form.querySelector('[name="email"]').value = record.email || '';
                    form.querySelector('[name="address"]').value = record.address || '';
                    btnDelete.classList.remove('hidden');
                }
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var payload = {
                        id: record ? record.id : 'CU' + String(Date.now()).slice(-6),
                        name: form.querySelector('[name="name"]').value,
                        contact: form.querySelector('[name="contact"]').value,
                        phone: form.querySelector('[name="phone"]').value,
                        email: form.querySelector('[name="email"]').value,
                        address: form.querySelector('[name="address"]').value,
                        date: record && record.date ? record.date : new Date().toISOString().slice(0, 10)
                    };
                    var updated = getUpdated();
                    updated[payload.id] = payload;
                    sessionStorage.setItem(STORAGE_UPDATED, JSON.stringify(updated));
                    alert('保存しました。');
                    location.href = 'customer-detail.html?id=' + encodeURIComponent(payload.id);
                });
                btnDelete.addEventListener('click', function() {
                    if (!confirm('この顧客を削除しますか？')) return;
                    var deleted = getDeleted();
                    if (record && deleted.indexOf(record.id) < 0) deleted.push(record.id);
                    sessionStorage.setItem(STORAGE_DELETED, JSON.stringify(deleted));
                    alert('削除しました。');
                    location.href = 'customer-list.html';
                });
            }
        })();
    </script>
</body>
</html>
