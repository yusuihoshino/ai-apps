<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>契約 シングルビュー - 管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-white min-h-screen">
    <header class="bg-white border-b border-gray-300 py-3">
        <div class="container mx-auto px-8 flex items-center justify-between">
            <nav class="inline-flex rounded-2xl bg-white p-1 gap-0.5">
                <a href="customer-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl text-gray-600 text-sm font-medium hover:bg-gray-100">顧客</a>
                <a href="contract-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl bg-gray-200 text-black text-sm font-medium">契約</a>
                <a href="incident-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl text-gray-600 text-sm font-medium hover:bg-gray-100">事故</a>
                <a href="application-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl text-gray-600 text-sm font-medium hover:bg-gray-100">申し込み</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-8 py-8">
        <a href="contract-list.html" class="inline-flex items-center gap-1 text-xs text-black hover:opacity-70 mb-2" aria-label="一覧に戻る">
            <span class="material-icons text-base">arrow_back</span>
            <span>一覧に戻る</span>
        </a>
        <div class="flex items-center justify-between gap-4 mb-4">
            <h1 id="page-title" class="text-lg font-bold text-black">契約詳細</h1>
        </div>
        <div id="not-found" class="hidden py-12 text-center">
            <p class="font-medium text-black">契約が見つかりません。</p>
            <a href="contract-list.html" class="inline-block mt-4 font-bold text-black hover:underline">一覧に戻る</a>
        </div>
        <div id="content" class="hidden">
            <div class="overflow-x-auto border border-gray-300 rounded-2xl w-full mb-8">
                <table class="w-full text-left table-fixed">
                    <tbody class="divide-y divide-gray-300">
                        <tr><th class="py-3 pl-4 pr-6 text-sm font-bold text-black bg-gray-50 w-32 text-left">契約ID</th><td id="d-id" class="py-3 pr-4 text-sm font-medium text-gray-800"></td></tr>
                        <tr><th class="py-3 pl-4 pr-6 text-sm font-bold text-black bg-gray-50 text-left">契約内容</th><td id="d-name" class="py-3 pr-4 text-sm font-medium text-gray-800"></td></tr>
                        <tr><th class="py-3 pl-4 pr-6 text-sm font-bold text-black bg-gray-50 text-left">顧客</th><td id="d-customer" class="py-3 pr-4 text-sm font-medium text-gray-800"></td></tr>
                        <tr><th class="py-3 pl-4 pr-6 text-sm font-bold text-black bg-gray-50 text-left">契約期間</th><td id="d-period" class="py-3 pr-4 text-sm font-medium text-gray-800"></td></tr>
                        <tr><th class="py-3 pl-4 pr-6 text-sm font-bold text-black bg-gray-50 text-left">料金</th><td id="d-amount" class="py-3 pr-4 text-sm font-medium text-gray-800"></td></tr>
                        <tr><th class="py-3 pl-4 pr-6 text-sm font-bold text-black bg-gray-50 text-left">支払状況</th><td id="d-payment" class="py-3 pr-4 text-sm font-medium text-gray-800"></td></tr>
                    </tbody>
                </table>
            </div>

            <section class="pt-8 mt-8">
                <div class="flex items-center justify-between gap-4 mb-4">
                    <h2 class="text-base font-bold text-black">関連する申し込み</h2>
                    <a id="btn-add-application" href="application-edit.html" class="inline-flex items-center justify-center gap-2 h-9 px-4 bg-black text-white rounded-xl text-sm font-bold hover:bg-gray-800 shrink-0">
                        <span class="material-icons text-lg">add</span>新規追加
                    </a>
                </div>
                <div class="overflow-x-auto border border-gray-300 rounded-2xl w-full">
                    <table class="w-full text-left">
                        <thead class="border-b-2 border-gray-300 bg-gray-50">
                            <tr>
                                <th class="pb-3 pt-3 pl-4 pr-4 text-sm font-bold text-black">申込内容</th>
                                <th class="pb-3 pt-3 pr-4 text-sm font-bold text-black">顧客名</th>
                                <th class="pb-3 pt-3 pr-4 text-sm font-bold text-black">申込日</th>
                                <th class="pb-3 pt-3 pr-4 text-sm font-bold text-black">対応状況</th>
                                <th class="pb-3 pt-3 pr-4 text-sm font-bold text-black w-12"></th>
                            </tr>
                        </thead>
                        <tbody id="related-application-tbody" class="divide-y divide-gray-300">
                        </tbody>
                    </table>
                </div>
                <p id="related-application-empty" class="hidden text-sm text-gray-500 py-4">関連する申し込みはありません。</p>
            </section>

            <section class="pt-8 mt-8">
                <div class="flex items-center justify-between gap-4 mb-4">
                    <h2 class="text-base font-bold text-black">関連する事故</h2>
                    <a id="btn-add-incident" href="incident-edit.html" class="inline-flex items-center justify-center gap-2 h-9 px-4 bg-black text-white rounded-xl text-sm font-bold hover:bg-gray-800 shrink-0">
                        <span class="material-icons text-lg">add</span>新規追加
                    </a>
                </div>
                <div class="overflow-x-auto border border-gray-300 rounded-2xl w-full">
                    <table class="w-full text-left">
                        <thead class="border-b-2 border-gray-300 bg-gray-50">
                            <tr>
                                <th class="pb-3 pt-3 pl-4 pr-4 text-sm font-bold text-black">件名</th>
                                <th class="pb-3 pt-3 pr-4 text-sm font-bold text-black">顧客名</th>
                                <th class="pb-3 pt-3 pr-4 text-sm font-bold text-black">発生日時</th>
                                <th class="pb-3 pt-3 pr-4 text-sm font-bold text-black">対応状況</th>
                                <th class="pb-3 pt-3 pr-4 text-sm font-bold text-black w-12"></th>
                            </tr>
                        </thead>
                        <tbody id="related-incident-tbody" class="divide-y divide-gray-300">
                        </tbody>
                    </table>
                </div>
                <p id="related-incident-empty" class="hidden text-sm text-gray-500 py-4">関連する事故はありません。</p>
            </section>
        </div>
    </main>

    <script>
        (function() {
            var STORAGE_DELETED = 'contract_deleted';
            var STORAGE_UPDATED = 'contract_updated';
            var baseList = [
                { id: 'C001', name: '火災保険（持ち家）', customerId: 'CU001', customerName: '山田 太郎', startDate: '2024-04-01', endDate: '2025-03-31', amount: '年額60,000円', paymentStatus: '納付済' },
                { id: 'C002', name: '自動車保険', customerId: 'CU002', customerName: '佐藤 花子', startDate: '2024-06-01', endDate: '2025-05-31', amount: '年額80,000円', paymentStatus: '未納' },
                { id: 'C003', name: '医療保険', customerId: 'CU001', customerName: '山田 太郎', startDate: '2024-10-01', endDate: '2025-09-30', amount: '月額8,000円', paymentStatus: '納付済' },
                { id: 'C004', name: '火災保険（賃貸）', customerId: 'CU003', customerName: '鈴木 一郎', startDate: '2024-01-15', endDate: '2025-01-14', amount: '年額20,000円', paymentStatus: '未納' },
                { id: 'C005', name: '自動車保険', customerId: 'CU002', customerName: '佐藤 花子', startDate: '2025-01-01', endDate: '2025-12-31', amount: '年額90,000円', paymentStatus: '納付済' }
            ];

            var baseApplications = [
                { id: 'AP001', date: '2025-02-15', subject: '火災保険（持ち家）の新規申込', customerId: 'CU001', contractId: 'C001', applicant: '山田 太郎', status: '審査中' },
                { id: 'AP002', date: '2025-02-10', subject: '自動車保険の契約を更新', customerId: 'CU002', contractId: 'C002', applicant: '佐藤 花子', status: '承認' },
                { id: 'AP003', date: '2025-02-01', subject: '自動車保険の個人情報更新依頼', customerId: 'CU003', contractId: 'C004', applicant: '鈴木 一郎', status: '審査中' },
                { id: 'AP004', date: '2025-01-25', subject: '医療保険の契約を更新', customerId: 'CU001', contractId: 'C003', applicant: '山田 太郎', status: '却下' },
                { id: 'AP005', date: '2025-02-20', subject: '自動車保険の特約追加申込', customerId: 'CU002', contractId: 'C005', applicant: '佐藤 花子', status: '審査中' }
            ];

            var baseIncidents = [
                { id: 'I001', date: '2025-02-10', time: '08:15', title: '人身事故（追突）', customerId: 'CU001', customerName: '山田 太郎', contractId: 'C001', status: '対応済' },
                { id: 'I002', date: '2025-02-05', time: '18:40', title: '人身事故（交差点）', customerId: 'CU002', customerName: '佐藤 花子', contractId: 'C002', status: '調査中' },
                { id: 'I003', date: '2025-01-28', time: '07:20', title: '人身事故（自転車との接触）', customerId: 'CU003', customerName: '鈴木 一郎', contractId: 'C004', status: '対応済' },
                { id: 'I004', date: '2025-01-15', time: '22:05', title: '人身事故（歩行者との接触）', customerId: 'CU001', customerName: '山田 太郎', contractId: 'C003', status: '対応済' },
                { id: 'I005', date: '2025-02-18', time: '14:30', title: '物損事故（駐車場での接触）', customerId: 'CU002', customerName: '佐藤 花子', contractId: 'C005', status: '調査中' }
            ];

            var id = (location.search.match(/[?&]id=([^&]+)/) || [])[1] ? decodeURIComponent((location.search.match(/[?&]id=([^&]+)/) || [])[1]) : '';
            function getDeleted() { try { return JSON.parse(sessionStorage.getItem(STORAGE_DELETED) || '[]'); } catch (e) { return []; } }
            function getUpdated() { try { return JSON.parse(sessionStorage.getItem(STORAGE_UPDATED) || '{}'); } catch (e) { return {}; } }
            function getRecord() {
                if (getDeleted().indexOf(id) >= 0) return null;
                var updated = getUpdated();
                var r = baseList.filter(function(x) { return x.id === id; })[0];
                return r ? (updated[id] || r) : null;
            }

            var record = getRecord();
            var notFound = document.getElementById('not-found');
            var content = document.getElementById('content');

            if (!record) {
                notFound.classList.remove('hidden');
            } else {
                content.classList.remove('hidden');
                document.getElementById('d-name').textContent = record.name || '—';
                document.getElementById('d-id').textContent = record.id || '—';
                document.getElementById('d-customer').innerHTML = record.customerId
                    ? '<a href="customer-detail.html?id=' + encodeURIComponent(record.customerId) + '" class="underline">' + (record.customerName || '—') + '</a>'
                    : (record.customerName || '—');
                document.getElementById('d-period').textContent = (record.startDate || '') + ' ～ ' + (record.endDate || '');
                document.getElementById('d-amount').textContent = record.amount || '—';
                function renderPaymentStatus(status) {
                    if (!status) return '—';
                    var baseClass = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold border ';
                    if (status === '未納') {
                        return '<span class="' + baseClass + 'bg-red-50 text-gray-900 border-red-200">未納</span>';
                    }
                    return '<span class="' + baseClass + 'bg-emerald-50 text-gray-900 border-emerald-200">' + status + '</span>';
                }
                document.getElementById('d-payment').innerHTML = renderPaymentStatus(record.paymentStatus);
                document.getElementById('page-title').textContent = '契約詳細';

                document.getElementById('btn-add-application').href = 'application-edit.html?contractId=' + encodeURIComponent(record.id) + '&customerId=' + encodeURIComponent(record.customerId || '');
                document.getElementById('btn-add-incident').href = 'incident-edit.html?contractId=' + encodeURIComponent(record.id);

                function renderAppStatus(s) {
                    if (!s) return '—';
                    var c = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold border ';
                    if (s === '審査中') return '<span class="' + c + 'bg-amber-50 text-gray-900 border-amber-200">審査中</span>';
                    if (s === '承認') return '<span class="' + c + 'bg-emerald-50 text-gray-900 border-emerald-200">承認</span>';
                    if (s === '却下') return '<span class="' + c + 'bg-red-50 text-gray-900 border-red-200">却下</span>';
                    return '<span class="' + c + 'bg-gray-50 text-gray-900 border-gray-200">' + s + '</span>';
                }
                function renderIncidentStatus(s) {
                    if (!s) return '—';
                    var c = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold border ';
                    if (s === '対応済') return '<span class="' + c + 'bg-emerald-50 text-gray-900 border-emerald-200">対応済</span>';
                    if (s === '調査中') return '<span class="' + c + 'bg-amber-50 text-gray-900 border-amber-200">調査中</span>';
                    return '<span class="' + c + 'bg-gray-50 text-gray-900 border-gray-200">' + s + '</span>';
                }

                // 関連申し込み
                var relApps = baseApplications.filter(function(a) { return a.contractId === record.id; });
                var appTbody = document.getElementById('related-application-tbody');
                var appEmpty = document.getElementById('related-application-empty');
                if (relApps.length === 0) {
                    appTbody.innerHTML = '';
                    appEmpty.classList.remove('hidden');
                } else {
                    appEmpty.classList.add('hidden');
                    appTbody.innerHTML = relApps.map(function(a) {
                        return '<tr class="hover:bg-gray-50 cursor-pointer row-link" data-href="application-detail.html?id=' + encodeURIComponent(a.id) + '">' +
                            '<td class="py-3 pl-4 pr-4 font-bold text-black">' + (a.subject || '') + '</td>' +
                            '<td class="py-3 pr-4 text-sm font-medium text-gray-800">' + (a.applicant || '—') + '</td>' +
                            '<td class="py-3 pr-4 text-sm font-medium text-gray-800">' + (a.date || '—') + '</td>' +
                            '<td class="py-3 pr-4 text-sm font-medium">' + renderAppStatus(a.status) + '</td>' +
                            '<td class="py-3 pr-4 row-actions relative">' +
                            '<button type="button" class="menu-btn inline-flex items-center justify-center w-8 h-8 rounded-full hover:bg-gray-100 text-gray-600" aria-label="メニュー">' +
                            '<span class="material-icons text-lg">more_vert</span></button>' +
                            '<div class="menu-dropdown hidden absolute right-0 top-full mt-1 z-20 w-32 py-1 border border-gray-300 rounded-xl bg-white shadow-lg">' +
                            '<a href="application-edit.html?id=' + encodeURIComponent(a.id) + '" class="block px-4 py-2 text-sm text-black hover:bg-gray-100">編集</a>' +
                            '<button type="button" class="app-row-delete block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50" data-id="' + a.id + '">削除</button>' +
                            '</div></td></tr>';
                    }).join('');
                }

                // 関連事故
                var relIncidents = baseIncidents.filter(function(i) { return i.contractId === record.id; });
                var incTbody = document.getElementById('related-incident-tbody');
                var incEmpty = document.getElementById('related-incident-empty');
                if (relIncidents.length === 0) {
                    incTbody.innerHTML = '';
                    incEmpty.classList.remove('hidden');
                } else {
                    incEmpty.classList.add('hidden');
                    incTbody.innerHTML = relIncidents.map(function(i) {
                        var datetime = (i.date || '') + (i.time ? ' ' + i.time : '');
                        return '<tr class="hover:bg-gray-50 cursor-pointer row-link" data-href="incident-detail.html?id=' + encodeURIComponent(i.id) + '">' +
                            '<td class="py-3 pl-4 pr-4 font-bold text-black">' + (i.title || '') + '</td>' +
                            '<td class="py-3 pr-4 text-sm font-medium text-gray-800">' + (i.customerName || '—') + '</td>' +
                            '<td class="py-3 pr-4 text-sm font-medium text-gray-800">' + (datetime || '—') + '</td>' +
                            '<td class="py-3 pr-4 text-sm font-medium">' + renderIncidentStatus(i.status) + '</td>' +
                            '<td class="py-3 pr-4 row-actions relative">' +
                            '<button type="button" class="menu-btn inline-flex items-center justify-center w-8 h-8 rounded-full hover:bg-gray-100 text-gray-600" aria-label="メニュー">' +
                            '<span class="material-icons text-lg">more_vert</span></button>' +
                            '<div class="menu-dropdown hidden absolute right-0 top-full mt-1 z-20 w-32 py-1 border border-gray-300 rounded-xl bg-white shadow-lg">' +
                            '<a href="incident-edit.html?id=' + encodeURIComponent(i.id) + '" class="block px-4 py-2 text-sm text-black hover:bg-gray-100">編集</a>' +
                            '<button type="button" class="inc-row-delete block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50" data-id="' + i.id + '">削除</button>' +
                            '</div></td></tr>';
                    }).join('');
                }

                document.getElementById('related-application-tbody').addEventListener('click', function(e) {
                    if (e.target.closest('.row-actions')) return;
                    var tr = e.target.closest('tr.row-link');
                    if (tr) location.href = tr.getAttribute('data-href');
                });
                document.getElementById('related-incident-tbody').addEventListener('click', function(e) {
                    if (e.target.closest('.row-actions')) return;
                    var tr = e.target.closest('tr.row-link');
                    if (tr) location.href = tr.getAttribute('data-href');
                });
                content.querySelectorAll('.menu-btn').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var open = document.querySelector('.menu-dropdown:not(.hidden)');
                        if (open && open !== this.nextElementSibling) open.classList.add('hidden');
                        this.nextElementSibling.classList.toggle('hidden');
                    });
                });
                content.querySelectorAll('.menu-dropdown').forEach(function(d) {
                    d.addEventListener('click', function(e) { e.stopPropagation(); });
                });
                document.addEventListener('click', function() {
                    document.querySelectorAll('.menu-dropdown').forEach(function(d) { d.classList.add('hidden'); });
                });
                content.querySelectorAll('.app-row-delete').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var id = this.getAttribute('data-id');
                        if (!confirm('この申し込みを削除しますか？')) return;
                        var del = JSON.parse(sessionStorage.getItem('application_deleted') || '[]');
                        if (del.indexOf(id) < 0) del.push(id);
                        sessionStorage.setItem('application_deleted', JSON.stringify(del));
                        location.reload();
                    });
                });
                content.querySelectorAll('.inc-row-delete').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var id = this.getAttribute('data-id');
                        if (!confirm('この事故を削除しますか？')) return;
                        var del = JSON.parse(sessionStorage.getItem('incident_deleted') || '[]');
                        if (del.indexOf(id) < 0) del.push(id);
                        sessionStorage.setItem('incident_deleted', JSON.stringify(del));
                        location.reload();
                    });
                });

            }
        })();
    </script>
</body>
</html>
