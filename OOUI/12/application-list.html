<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申し込み一覧 - 管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-white min-h-screen">
    <header class="bg-white border-b border-gray-300 py-3">
        <div class="container mx-auto px-8">
            <nav class="inline-flex rounded-2xl bg-white p-1 gap-0.5">
                <a href="customer-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl text-gray-600 text-sm font-medium hover:bg-gray-100">顧客</a>
                <a href="contract-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl text-gray-600 text-sm font-medium hover:bg-gray-100">契約</a>
                <a href="incident-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl text-gray-600 text-sm font-medium hover:bg-gray-100">事故</a>
                <a href="application-list.html" class="inline-flex items-center justify-center h-9 px-3 rounded-xl bg-gray-200 text-black text-sm font-medium">申し込み</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-8 py-8">
        <div class="w-full max-w-full">
            <div class="flex items-center justify-between gap-3 mb-2">
                <div class="flex items-center gap-3">
                    <h1 class="text-lg font-bold text-black">申し込み</h1>
                    <div class="relative">
                        <input type="text" id="application-search" placeholder="検索" class="h-9 w-56 pl-8 pr-3 rounded-2xl border border-gray-400 text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-black focus:border-black">
                        <span class="material-icons text-gray-500 text-base absolute left-2.5 top-1/2 -translate-y-1/2 pointer-events-none">search</span>
                    </div>
                    <div class="relative">
                        <button type="button" id="filter-btn" class="inline-flex items-center justify-center h-9 px-4 border border-gray-400 rounded-2xl bg-white text-sm font-medium text-black hover:bg-gray-50">
                            <span class="material-icons text-lg mr-1">filter_list</span>フィルター
                        </button>
                        <div id="filter-panel" class="hidden absolute right-0 top-full mt-1 z-30 w-56 py-3 px-4 border border-gray-300 rounded-2xl bg-white shadow-lg">
                            <p class="text-xs font-bold text-black mb-2">対応状況</p>
                            <label class="flex items-center gap-2 cursor-pointer text-sm font-medium text-black mb-1"><input type="checkbox" id="filter-review" class="rounded border-gray-400">審査中</label>
                            <label class="flex items-center gap-2 cursor-pointer text-sm font-medium text-black mb-1"><input type="checkbox" id="filter-approved" class="rounded border-gray-400">承認</label>
                            <label class="flex items-center gap-2 cursor-pointer text-sm font-medium text-black"><input type="checkbox" id="filter-rejected" class="rounded border-gray-400">却下</label>
                        </div>
                    </div>
                </div>
                <a href="application-edit.html" class="inline-flex items-center justify-center gap-2 h-9 px-4 bg-black text-white rounded-xl text-sm font-bold hover:bg-gray-800 shrink-0">
                    <span class="material-icons text-lg">add</span>新規作成
                </a>
            </div>
            <div class="overflow-x-auto border border-gray-300 rounded-2xl w-full">
                <table class="w-full text-left">
                <thead class="border-b-2 border-gray-300 bg-gray-50">
                    <tr>
                        <th class="pb-3 pt-3 pl-6 pr-8 text-sm font-bold text-black">ID</th>
                        <th class="pb-3 pt-3 pr-8 text-sm font-bold text-black">申込内容</th>
                        <th class="pb-3 pt-3 pr-8 text-sm font-bold text-black">顧客名</th>
                        <th class="pb-3 pt-3 pr-8 text-sm font-bold text-black">申込日</th>
                        <th class="pb-3 pt-3 pr-8 text-sm font-bold text-black">対応状況</th>
                        <th class="pb-3 pt-3 pr-8 text-sm font-bold text-black">備考</th>
                        <th class="pb-3 pt-3 pr-6 text-sm font-bold text-black w-12"></th>
                    </tr>
                </thead>
                <tbody id="tbody">
                </tbody>
            </table>
            </div>
        </div>
    </main>

    <script>
        (function() {
            var STORAGE_DELETED = 'application_deleted';
            var STORAGE_UPDATED = 'application_updated';
            var baseList = [
                { id: 'AP001', date: '2025-02-15', subject: '火災保険（持ち家）の新規申込', customerId: 'CU001', contractId: 'C001', applicant: '山田 太郎', applicantContact: '山田 太郎', status: '審査中', notes: '初めて火災保険に加入するための申込。' },
                { id: 'AP002', date: '2025-02-10', subject: '自動車保険の契約を更新', customerId: 'CU002', contractId: 'C002', applicant: '佐藤 花子', applicantContact: '佐藤 花子', status: '承認', notes: '前年と同条件での更新。' },
                { id: 'AP003', date: '2025-02-01', subject: '自動車保険の個人情報更新依頼', customerId: 'CU003', contractId: 'C004', applicant: '鈴木 一郎', applicantContact: '鈴木 一郎', status: '審査中', notes: '住所・連絡先の変更に伴う情報更新。' },
                { id: 'AP004', date: '2025-01-25', subject: '医療保険の契約を更新', customerId: 'CU001', contractId: 'C003', applicant: '山田 太郎', applicantContact: '山田 太郎', status: '却下', notes: '告知内容に不備があり差し戻し。' },
                { id: 'AP005', date: '2025-02-20', subject: '自動車保険の特約追加申込', customerId: 'CU002', contractId: 'C005', applicant: '佐藤 花子', applicantContact: '佐藤 花子', status: '審査中', notes: '弁護士費用特約の追加を希望。' }
            ];

            function getDeleted() { try { return JSON.parse(sessionStorage.getItem(STORAGE_DELETED) || '[]'); } catch (e) { return []; } }
            function getUpdated() { try { return JSON.parse(sessionStorage.getItem(STORAGE_UPDATED) || '{}'); } catch (e) { return {}; } }
            function getList() {
                return baseList.filter(function(r) { return getDeleted().indexOf(r.id) < 0; }).map(function(r) { return getUpdated()[r.id] || r; });
            }

            function renderStatus(status) {
                if (!status) return '—';
                var baseClass = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold border ';
                if (status === '審査中') {
                    return '<span class="' + baseClass + 'bg-amber-50 text-gray-900 border-amber-200">審査中</span>';
                }
                if (status === '承認') {
                    return '<span class="' + baseClass + 'bg-emerald-50 text-gray-900 border-emerald-200">承認</span>';
                }
                if (status === '却下') {
                    return '<span class="' + baseClass + 'bg-red-50 text-gray-900 border-red-200">却下</span>';
                }
                return '<span class="' + baseClass + 'bg-gray-50 text-gray-900 border-gray-200">' + status + '</span>';
            }

            function render() {
                var list = getList().slice().sort(function(a, b) {
                    return (a.id || '').localeCompare(b.id || '') * -1;
                });
                var keyword = (document.getElementById('application-search').value || '').toLowerCase();
                if (keyword) {
                    list = list.filter(function(r) {
                        return (r.id || '').toLowerCase().indexOf(keyword) >= 0 ||
                            (r.applicant || '').toLowerCase().indexOf(keyword) >= 0 ||
                            (r.subject || '').toLowerCase().indexOf(keyword) >= 0 ||
                            (r.notes || '').toLowerCase().indexOf(keyword) >= 0;
                    });
                }
                var review = document.getElementById('filter-review').checked;
                var approved = document.getElementById('filter-approved').checked;
                var rejected = document.getElementById('filter-rejected').checked;
                if (review || approved || rejected) {
                    list = list.filter(function(r) {
                        return (review && r.status === '審査中') || (approved && r.status === '承認') || (rejected && r.status === '却下');
                    });
                }
                var tbody = document.getElementById('tbody');
                tbody.innerHTML = list.map(function(r) {
                    var subjectCell = '<span class="font-bold text-black">' + (r.subject || '') + '</span>';
                    return '<tr class="hover:bg-gray-50 cursor-pointer row-link" data-href="application-detail.html?id=' + encodeURIComponent(r.id) + '">' +
                        '<td class="py-3 pl-6 pr-8 text-sm font-medium text-gray-800">' + (r.id || '—') + '</td>' +
                        '<td class="py-3 pr-8">' + subjectCell + '</td>' +
                        '<td class="py-3 pr-8 text-sm font-medium text-gray-800">' + (r.applicant || '—') + '</td>' +
                        '<td class="py-3 pr-8 text-sm font-medium text-gray-800">' + (r.date || '—') + '</td>' +
                        '<td class="py-3 pr-8 text-sm font-medium">' + renderStatus(r.status) + '</td>' +
                        '<td class="py-3 pr-8 text-sm font-medium text-gray-800 max-w-xs truncate" title="' + (r.notes || '').replace(/"/g, '&quot;') + '">' + (r.notes || '—') + '</td>' +
                        '<td class="py-3 pr-6 row-actions relative">' +
                        '<button type="button" class="menu-btn relative inline-flex items-center justify-center w-8 h-8 rounded-full hover:bg-gray-100 text-gray-600" data-id="' + r.id + '" aria-label="メニュー">' +
                        '<span class="material-icons text-lg">more_vert</span></button>' +
                        '<div class="menu-dropdown hidden absolute right-0 top-full mt-1 z-20 w-32 py-1 border border-gray-300 rounded-xl bg-white shadow-lg">' +
                        '<a href="application-edit.html?id=' + encodeURIComponent(r.id) + '" class="block px-4 py-2 text-sm text-black hover:bg-gray-100">編集</a>' +
                        '<button type="button" class="application-delete block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50" data-id="' + r.id + '">削除</button>' +
                        '</div></td></tr>';
                }).join('');

                tbody.querySelectorAll('tr.row-link').forEach(function(tr) {
                    tr.addEventListener('click', function(e) {
                        if (e.target.closest('.row-actions')) return;
                        location.href = this.getAttribute('data-href');
                    });
                });
                tbody.querySelectorAll('.menu-btn').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var open = document.querySelector('.menu-dropdown:not(.hidden)');
                        if (open && open !== this.nextElementSibling) open.classList.add('hidden');
                        this.nextElementSibling.classList.toggle('hidden');
                    });
                });
                tbody.querySelectorAll('.menu-dropdown').forEach(function(d) {
                    d.addEventListener('click', function(e) { e.stopPropagation(); });
                });
                document.addEventListener('click', function() {
                    document.querySelectorAll('.menu-dropdown').forEach(function(d) { d.classList.add('hidden'); });
                });
                document.querySelectorAll('.application-delete').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var id = this.getAttribute('data-id');
                        if (!confirm('この申し込みを削除しますか？')) return;
                        var deleted = getDeleted();
                        if (deleted.indexOf(id) < 0) deleted.push(id);
                        sessionStorage.setItem(STORAGE_DELETED, JSON.stringify(deleted));
                        render();
                    });
                });
            }
            document.getElementById('filter-btn').addEventListener('click', function(e) {
                e.stopPropagation();
                document.getElementById('filter-panel').classList.toggle('hidden');
            });
            document.addEventListener('click', function() { document.getElementById('filter-panel').classList.add('hidden'); });
            document.getElementById('filter-panel').addEventListener('click', function(e) { e.stopPropagation(); });
            document.getElementById('filter-review').addEventListener('change', render);
            document.getElementById('filter-approved').addEventListener('change', render);
            document.getElementById('filter-rejected').addEventListener('change', render);
            document.getElementById('application-search').addEventListener('input', render);

            render();
        })();
    </script>
</body>
</html>
