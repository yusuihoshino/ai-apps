                    needsSave = true;
                    return { ...p, companyName: companyById[p.id] };

                return p;
            });
            if (needsSave) localStorage.setItem('purchases', JSON.stringify(purchases));

        // 金額をフォーマット

            return new Intl.NumberFormat('ja-JP').format(amount);

        // 日付を日本語表示形式にフォーマット
        function formatDateDisplay(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${year}年${month}月${day}日`;
        }

        // 仕入れ詳細を表示

            document.getElementById('pageTitle').textContent = `${displayName}の仕入れ`;

            `;
            deleteBtn.title = '削除';
            deleteBtn.addEventListener('click', () => {
                if (confirm('この仕入れを削除しますか？')) {
                    purchases = purchases.filter(p => p.id !== purchaseId);

            actionButtons.appendChild(deleteBtn);

        function renderPurchaseHistory() {
            const tbody = document.getElementById('purchaseHistoryBody');
            const emptyEl = document.getElementById('purchaseHistoryEmpty');
            tbody.innerHTML = '';
            const raw = JSON.parse(localStorage.getItem('history') || '[]');
            const purchases = JSON.parse(localStorage.getItem('purchases') || '[]');
            const purchasePrefix = '仕入れ ' + (purchaseId || '');
            const items = raw.filter(item => (item.target || '').startsWith(purchasePrefix));
            if (items.length === 0) {
                emptyEl.classList.remove('hidden');
                return;
            }
            emptyEl.classList.add('hidden');
            const historyItems = JSON.parse(localStorage.getItem('history') || '[]');
            items.forEach((item, i) => {
                const globalIndex = historyItems.findIndex(h => h.datetime === item.datetime && h.user === item.user && (h.target || '') === (item.target || ''));
                const actionText = item.action === '追加' ? '作成しました' : item.action === '編集' ? '編集しました' : item.action === '削除' ? '削除しました' : (item.action || '') + 'しました';
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors';
                row.innerHTML = `
                    <td class="px-4 py-3 text-sm text-gray-900">${item.datetime}</td>
                    <td class="px-4 py-3 text-sm text-gray-900">
                        <span class="material-icons text-gray-500 text-base align-middle mr-1">person</span>${item.user}
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-900">${actionText}</td>
                    <td class="px-4 py-3 text-right">
                        <button type="button" class="p-1 text-gray-500 hover:text-gray-700 rounded" aria-label="メニュー" data-history-index="${globalIndex >= 0 ? globalIndex : i}">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                        </button>
                    </td>
                `;
                const btn = row.querySelector('button[data-history-index]');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = btn.getAttribute('data-history-index');
                    window.location.href = 'history-detail.html?index=' + encodeURIComponent(idx);
                });
                tbody.appendChild(row);
            });
        }

                if (key === 'price') return item.price || 0;
                if (key === 'quantity') return item.quantity || 0;
                if (key === 'total') return (item.price || 0) * (item.quantity || 0);
                return 0;
            };
            const sortedItems = [...items].sort((a, b) => {
                const va = getSortVal(a, purchaseItemSortKey);
                const vb = getSortVal(b, purchaseItemSortKey);
                let cmp = (typeof va === 'string') ? (va.localeCompare(vb)) : (va - vb);
                return purchaseItemSortDir === 'asc' ? cmp : -cmp;
            });

            sortedItems.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors';
                
                const totalAmount = (item.price || 0) * (item.quantity || 0);
                row.innerHTML = `
                    <td class="px-4 py-3 text-sm">
                        <a href="product-detail.html?productId=${item.id}" class="text-blue-600 hover:text-blue-800 underline transition-colors">${item.name}</a>
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-900">${item.id}</td>
                    <td class="px-4 py-3 text-sm text-gray-900">¥${formatCurrency(item.price)}</td>
                    <td class="px-4 py-3 text-sm text-gray-900">${item.quantity}個</td>
                    <td class="px-4 py-3 text-sm text-gray-900">¥${formatCurrency(totalAmount)}</td>
                `;

                tbody.appendChild(row);
            });

            document.querySelectorAll('thead th[data-sort]').forEach(th => {
                const key = th.getAttribute('data-sort');
                const span = th.querySelector('.sort-indicator');
                if (span) span.textContent = (purchaseItemSortKey === key) ? (purchaseItemSortDir === 'asc' ? ' ▲' : ' ▼') : '';
            });
        }

        function setupPurchaseItemSort() {
            document.querySelectorAll('thead th[data-sort]').forEach(th => {
                th.onclick = () => {
                    const key = th.getAttribute('data-sort');
                    if (purchaseItemSortKey === key) purchaseItemSortDir = purchaseItemSortDir === 'asc' ? 'desc' : 'asc';
                    else { purchaseItemSortKey = key; purchaseItemSortDir = 'asc'; }
                    const purchase = purchases.find(p => p.id === purchaseId);
                    if (purchase) renderPurchaseItems(purchase.items);
                };
            });
        }

        // 初期化
        if (purchaseId) {
            renderPurchaseDetail();
            setupPurchaseItemSort();
        } else {
            document.getElementById('purchaseId').textContent = '仕入れIDが指定されていません';
        }
    </script>
            </div>
        </div>
    </div>
</body>
</html>
