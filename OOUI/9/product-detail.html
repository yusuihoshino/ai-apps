        // 直近の仕入れリストを表示
        function renderPurchaseHistory(productName) {
            // 仕入れデータを取得（常に最新のサンプルデータを使用）
            let purchases = JSON.parse(localStorage.getItem('purchases') || '[]');
            
            // サンプルデータに新しい仕入れが含まれているか確認し、含まれていない場合は更新
            const hasNewPurchases = purchases.some(p => p.id === 'P013' || p.id === 'P014' || p.id === 'P015' || p.id === 'P016' || p.id === 'P017');
            if (purchases.length === 0 || !hasNewPurchases) {
                // 既存のデータと新しいデータをマージ（重複を避ける）
                const existingIds = new Set(purchases.map(p => p.id));
                const newPurchases = samplePurchases.filter(p => !existingIds.has(p.id));
                purchases = [...purchases, ...newPurchases];
                // 日付順にソート
                purchases.sort((a, b) => new Date(b.date) - new Date(a.date));
                localStorage.setItem('purchases', JSON.stringify(purchases));
            }

            // 該当商品が含まれる仕入れを取得（仕入れ一覧と同じカテゴリで表示）
            const history = [];
            purchases.forEach(purchase => {
                if (purchase.items && Array.isArray(purchase.items)) {
                    const hasProduct = purchase.items.some(item => item && item.name === productName);
                    if (hasProduct) {
                        const companyName = purchase.companyName || (purchase.items.length > 0
                            ? purchase.items.map(i => i.name).join('、')
                            : '—');
                        history.push({
                            purchaseId: purchase.id,
                            companyName: companyName,
                            date: purchase.date,
                            totalAmount: purchase.totalAmount
                        });
                    }
                }
            });

            renderPurchaseHistoryTable(history);
        }

        let purchaseHistorySortKey = 'date';
        let purchaseHistorySortDir = 'desc';

        function renderPurchaseHistoryTable(history) {
            const tbody = document.getElementById('purchaseHistoryBody');
            tbody.innerHTML = '';

            if (history.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="3" class="px-4 py-8 text-center text-gray-500">仕入れ履歴がありません</td>';
                tbody.appendChild(row);
                return;
            }

            const getSortVal = (item, key) => {
                if (key === 'purchaseId') return item.purchaseId || '';
                if (key === 'companyName') return item.companyName || '';
                if (key === 'date') return new Date(item.date || 0).getTime();
                return 0;
            };
            const sortedHistory = [...history].sort((a, b) => {
                const va = getSortVal(a, purchaseHistorySortKey);
                const vb = getSortVal(b, purchaseHistorySortKey);
                let cmp = (typeof va === 'string') ? (va.localeCompare(vb)) : (va - vb);
                return purchaseHistorySortDir === 'asc' ? cmp : -cmp;
            });

            // 最新の5件のみ表示
            const recentHistory = sortedHistory.slice(0, 5);

            recentHistory.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 cursor-pointer transition-colors';
                
                row.innerHTML = `
                    <td class="px-4 py-3 text-sm text-blue-600 hover:text-blue-800 underline cursor-pointer">${item.purchaseId}</td>
                    <td class="px-4 py-3 text-sm text-gray-900">${item.companyName}</td>
                    <td class="px-4 py-3 text-sm text-gray-900">${formatDateDisplay(item.date)}</td>
                `;

                // クリックで仕入れ詳細ページに移動
                row.addEventListener('click', () => {
                    window.location.href = `purchase-detail.html?id=${item.purchaseId}`;
                });

                tbody.appendChild(row);
            });

            document.querySelectorAll('#purchaseHistoryBody').closest('table').querySelectorAll('thead th[data-sort]').forEach(th => {
                const key = th.getAttribute('data-sort');
                const span = th.querySelector('.sort-indicator');
                if (span) span.textContent = (purchaseHistorySortKey === key) ? (purchaseHistorySortDir === 'asc' ? ' ▲' : ' ▼') : '';
            });
        }

        function setupPurchaseHistorySort() {
            document.querySelectorAll('#purchaseHistoryBody').closest('table').querySelectorAll('thead th[data-sort]').forEach(th => {
                th.onclick = () => {
                    const key = th.getAttribute('data-sort');
                    if (purchaseHistorySortKey === key) purchaseHistorySortDir = purchaseHistorySortDir === 'asc' ? 'desc' : 'asc';
                    else { purchaseHistorySortKey = key; purchaseHistorySortDir = 'asc'; }
                    const product = products.find(p => p.id === productId);
                    if (product) renderPurchaseHistory(product.name);
                };
            });
        }

        // 初期化
        if (productId) {
            renderProductDetail();
            setupPurchaseHistorySort();
        } else {
            document.getElementById('productId').textContent = '商品IDが指定されていません';
        }
    </script>
            </div>
        </div>
    </div>
</body>
</html>
