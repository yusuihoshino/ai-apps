<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レポート詳細</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- サイドバー -->
        <div class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-200">
                <h1 class="text-xl font-bold text-gray-900">KANRI</h1>
            </div>
            <nav class="flex-1 p-4">
                <a 
                    href="purchase-list.html"
                    class="flex items-center gap-3 px-4 py-3 mb-2 font-semibold text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors"
                >
                    <span class="material-icons">shopping_cart</span>
                    <span>仕入れ</span>
                </a>
                <a 
                    href="product-list.html"
                    class="flex items-center gap-3 px-4 py-3 mb-2 font-semibold text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors"
                >
                    <span class="material-icons">inventory</span>
                    <span>商品</span>
                </a>
                <a 
                    href="inventory-list.html"
                    class="flex items-center gap-3 px-4 py-3 mb-2 font-semibold text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors"
                >
                    <span class="material-icons">checklist</span>
                    <span>棚卸し</span>
                </a>
                <a 
                    href="report-list.html"
                    class="flex items-center gap-3 px-4 py-3 mb-2 font-semibold text-gray-900 bg-blue-50 text-blue-600 rounded-lg transition-colors"
                >
                    <span class="material-icons">assessment</span>
                    <span>レポート</span>
                </a>
                <a 
                    href="history.html"
                    class="flex items-center gap-3 px-4 py-3 mb-2 font-semibold text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors"
                >
                    <span class="material-icons">history</span>
                    <span>変更履歴</span>
                </a>
            </nav>
            <!-- ユーザー情報 -->
            <div class="p-4 border-t border-gray-200">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center overflow-hidden">
                        <span class="material-icons text-gray-600">person</span>
                    </div>
                    <div>
                        <div class="text-sm font-semibold text-gray-900">星野結水</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- メインコンテンツ -->
        <div class="flex-1 overflow-y-auto">
            <div class="container mx-auto px-4 py-8 max-w-4xl">
                <!-- ヘッダー -->
                <div class="flex items-center gap-4 mb-6">
                    <a href="report-list.html" class="text-blue-600 hover:text-blue-700 transition-colors">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </a>
                    <h1 id="pageTitle" class="text-2xl font-bold text-gray-900">レポート詳細</h1>
                </div>


                <!-- ダッシュボードカード -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-6 space-y-4">
                        <div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">
                            <span class="text-gray-900 font-medium">前期末棚卸高</span>
                            <span id="reportPreviousInventory" class="text-lg font-semibold text-gray-900">—</span>
                        </div>
                        <div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">
                            <span class="text-gray-900 font-medium">今期の仕入高</span>
                            <span id="reportCurrentPurchases" class="text-lg font-semibold text-gray-900">—</span>
                        </div>
                        <div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">
                            <span class="text-gray-900 font-medium">今期末の棚卸高</span>
                            <span id="reportCurrentInventory" class="text-lg font-semibold text-gray-900">—</span>
                        </div>
                        <div class="flex items-center justify-between py-3">
                            <span class="text-gray-900 font-medium">売上原価</span>
                            <span id="reportCostOfSales" class="text-lg font-semibold text-gray-900">—</span>
                        </div>
                    </div>
                </div>

                <!-- グラフ -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden mt-6">
                    <div class="p-6">
                        <h2 class="text-lg font-semibold text-gray-900 mb-6">レポートグラフ</h2>
                        <div class="w-full">
                            <svg id="reportChart" width="100%" height="400" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">
                                <!-- グラフはJavaScriptで動的に描画 -->
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // URLパラメータから年を取得
        const urlParams = new URLSearchParams(window.location.search);
        const yearParam = urlParams.get('year');

        // 金額フォーマット
        function formatCurrency(amount) {
            return '¥' + new Intl.NumberFormat('ja-JP').format(amount);
        }

        function renderReport() {
            const purchases = JSON.parse(localStorage.getItem('purchases') || '[]');
            const inventories = JSON.parse(localStorage.getItem('inventories') || '[]');

            const now = new Date();
            const currentYear = now.getFullYear();
            const selectedYear = yearParam ? parseInt(yearParam) : currentYear;
            const previousYear = selectedYear - 1;

            // ページタイトルを更新
            document.getElementById('pageTitle').textContent = `${selectedYear}年 レポート詳細`;

            // 今期の仕入高: 選択年の仕入れ合計
            const currentPurchases = purchases.filter(p => {
                const y = new Date(p.date).getFullYear();
                return y === selectedYear;
            });
            let currentPurchasesTotal = currentPurchases.reduce((sum, p) => sum + (p.totalAmount || 0), 0);
            // データがない場合は適当な金額を設定
            if (currentPurchasesTotal === 0) {
                currentPurchasesTotal = 2000000; // 200万円
            }

            // 棚卸しは日付でソート（新しい順）
            const sortedInventories = [...inventories].sort((a, b) => new Date(b.date) - new Date(a.date));

            // 今期末の棚卸高: 選択年の最新棚卸しの合計金額（なければ直近の棚卸し）
            const currentYearInventories = sortedInventories.filter(i => new Date(i.date).getFullYear() === selectedYear);
            const latestCurrentInventory = currentYearInventories[0] || sortedInventories.find(i => new Date(i.date).getFullYear() <= selectedYear);
            let currentInventoryValue = latestCurrentInventory ? (latestCurrentInventory.totalAmount || 0) : 0;
            // データがない場合は適当な金額を設定
            if (currentInventoryValue === 0) {
                currentInventoryValue = 1800000; // 180万円
            }

            // 前期末棚卸高: 前年の最新棚卸しの合計金額（なければ直近の前年以前の棚卸し）
            const previousYearInventories = sortedInventories.filter(i => new Date(i.date).getFullYear() === previousYear);
            const latestPreviousInventory = previousYearInventories[0] || sortedInventories.find(i => new Date(i.date).getFullYear() < selectedYear);
            let previousInventoryValue = latestPreviousInventory ? (latestPreviousInventory.totalAmount || 0) : 0;
            // データがない場合は適当な金額を設定
            if (previousInventoryValue === 0) {
                previousInventoryValue = 1500000; // 150万円
            }

            // 売上原価 = 前期末棚卸高 + 今期の仕入高 - 今期末の棚卸高
            const costOfSales = previousInventoryValue + currentPurchasesTotal - currentInventoryValue;

            document.getElementById('reportPreviousInventory').textContent = formatCurrency(previousInventoryValue);
            document.getElementById('reportCurrentPurchases').textContent = formatCurrency(currentPurchasesTotal);
            document.getElementById('reportCurrentInventory').textContent = formatCurrency(currentInventoryValue);
            document.getElementById('reportCostOfSales').textContent = formatCurrency(Math.max(0, costOfSales));

            // グラフを描画
            renderChart(previousInventoryValue, currentPurchasesTotal, currentInventoryValue, Math.max(0, costOfSales));
        }

        function renderChart(previousInventory, currentPurchases, currentInventory, costOfSales) {
            const svg = document.getElementById('reportChart');
            svg.innerHTML = '';

            const width = 800;
            const height = 400;
            const padding = { top: 40, right: 40, bottom: 80, left: 80 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            // データ
            const data = [
                { label: '前期末棚卸高', value: previousInventory, color: '#3B82F6' },
                { label: '今期の仕入高', value: currentPurchases, color: '#10B981' },
                { label: '今期末の棚卸高', value: currentInventory, color: '#F59E0B' },
                { label: '売上原価', value: costOfSales, color: '#EF4444' }
            ];

            // 最大値を計算
            const maxValue = Math.max(...data.map(d => d.value)) * 1.1;

            // Y軸の目盛り
            const yTicks = 5;
            const tickStep = maxValue / yTicks;

            // グリッド線とY軸ラベル
            for (let i = 0; i <= yTicks; i++) {
                const y = padding.top + chartHeight - (chartHeight * i / yTicks);
                const value = Math.round(tickStep * i);

                // グリッド線
                svg.innerHTML += `<line x1="${padding.left}" y1="${y}" x2="${padding.left + chartWidth}" y2="${y}" stroke="#E5E7EB" stroke-width="1" />`;
                
                // Y軸ラベル
                svg.innerHTML += `<text x="${padding.left - 10}" y="${y + 5}" text-anchor="end" font-size="12" fill="#6B7280">${formatCurrency(value)}</text>`;
            }

            // 棒グラフ
            const barWidth = chartWidth / data.length * 0.6;
            const barSpacing = chartWidth / data.length;

            data.forEach((item, index) => {
                const x = padding.left + (index * barSpacing) + (barSpacing - barWidth) / 2;
                const barHeight = (item.value / maxValue) * chartHeight;
                const y = padding.top + chartHeight - barHeight;

                // 棒
                svg.innerHTML += `<rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" fill="${item.color}" rx="4" />`;
                
                // 値のラベル
                const labelY = y - 5;
                svg.innerHTML += `<text x="${x + barWidth / 2}" y="${labelY}" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">${formatCurrency(item.value)}</text>`;
                
                // X軸ラベル
                const labelX = x + barWidth / 2;
                const labelYBottom = padding.top + chartHeight + 20;
                svg.innerHTML += `<text x="${labelX}" y="${labelYBottom}" text-anchor="middle" font-size="12" fill="#374151">${item.label}</text>`;
            });

            // X軸の線
            svg.innerHTML += `<line x1="${padding.left}" y1="${padding.top + chartHeight}" x2="${padding.left + chartWidth}" y2="${padding.top + chartHeight}" stroke="#374151" stroke-width="2" />`;
            
            // Y軸の線
            svg.innerHTML += `<line x1="${padding.left}" y1="${padding.top}" x2="${padding.left}" y2="${padding.top + chartHeight}" stroke="#374151" stroke-width="2" />`;
        }

        // 初期化
        renderReport();
    </script>
</body>
</html>
