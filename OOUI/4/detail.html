<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会議室詳細</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8">
        <!-- ヘッダー -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-blue-600 hover:text-blue-700 transition-colors">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </a>
                <h1 id="roomTitle" class="text-2xl font-bold text-gray-900">会議室詳細</h1>
            </div>
            <!-- 3点メニューボタン -->
            <div class="relative">
                <button 
                    id="menuBtn"
                    class="p-2 text-gray-600 hover:bg-gray-200 rounded-lg transition-colors"
                    title="メニュー"
                >
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="5" r="1"/>
                        <circle cx="12" cy="12" r="1"/>
                        <circle cx="12" cy="19" r="1"/>
                    </svg>
                </button>
                
                <!-- メニュー -->
                <div id="menuDropdown" class="hidden absolute top-full right-0 mt-2 bg-white rounded-lg shadow-lg border border-gray-200 py-2 min-w-[180px] z-50">
                    <button 
                        id="editRoomMenuBtn"
                        class="w-full text-left px-4 py-2 text-gray-700 hover:bg-gray-100 transition-colors flex items-center gap-2"
                    >
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        <span>編集</span>
                    </button>
                    <button 
                        id="deleteRoomMenuBtn"
                        class="w-full text-left px-4 py-2 text-red-600 hover:bg-red-50 transition-colors flex items-center gap-2"
                    >
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                        <span>削除</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 会議室情報 -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
            <div class="space-y-2">
                <div class="flex items-center gap-2">
                    <span class="text-gray-600">階数:</span>
                    <span class="font-medium text-gray-900" id="floor">3階</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-gray-600">定員:</span>
                    <span class="font-medium text-gray-900" id="capacity">10名</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-gray-600">設備:</span>
                    <span class="font-medium text-gray-900" id="equipment">プロジェクター、ホワイトボード、Wi-Fi</span>
                </div>
            </div>
        </div>

        <!-- 画像ギャラリー -->
        <div id="imageGallery" class="grid grid-cols-3 gap-4">
            <div class="bg-gray-300 rounded-lg aspect-video flex items-center justify-center">
                <svg class="w-24 h-24 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
            </div>
            <div class="bg-gray-300 rounded-lg aspect-video flex items-center justify-center">
                <svg class="w-24 h-24 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
            </div>
            <div class="bg-gray-300 rounded-lg aspect-video flex items-center justify-center">
                <svg class="w-24 h-24 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- 編集モーダル -->
    <div id="editRoomModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
            <h2 class="text-xl font-bold text-gray-900 mb-4">会議室名を編集</h2>
            <form id="editRoomForm">
                <div class="mb-4">
                    <label for="editRoomName" class="block text-sm font-medium text-gray-700 mb-2">
                        会議室名
                    </label>
                    <input
                        type="text"
                        id="editRoomName"
                        required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                </div>
                <div class="flex gap-3 justify-start">
                    <button
                        type="button"
                        id="deleteRoomInModalBtn"
                        class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors"
                    >
                        削除
                    </button>
                    <button
                        type="button"
                        id="cancelEditBtn"
                        class="px-4 py-2 text-gray-700 bg-gray-200 rounded-lg hover:bg-gray-300 transition-colors"
                    >
                        キャンセル
                    </button>
                    <button
                        type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
                    >
                        更新
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // URLパラメータから会議室IDを取得
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = parseInt(urlParams.get('room')) || 1;

        // 会議室データを取得
        let rooms = JSON.parse(localStorage.getItem('rooms') || '[]');
        if (rooms.length === 0) {
            rooms = [
                { id: 1, name: '会議室1' },
                { id: 2, name: '会議室2' },
                { id: 3, name: '会議室3' },
                { id: 4, name: '会議室4' },
                { id: 5, name: '会議室5' }
            ];
            localStorage.setItem('rooms', JSON.stringify(rooms));
        } else if (rooms.length < 5) {
            // 会議室が5つ未満の場合は、不足分を追加
            const existingIds = rooms.map(r => r.id);
            let nextId = Math.max(...existingIds, 0) + 1;
            const defaultNames = ['会議室1', '会議室2', '会議室3', '会議室4', '会議室5'];
            
            while (rooms.length < 5) {
                const roomNumber = rooms.length + 1;
                rooms.push({ id: nextId, name: defaultNames[roomNumber - 1] });
                nextId++;
            }
            localStorage.setItem('rooms', JSON.stringify(rooms));
        }

        const room = rooms.find(r => r.id === roomId);
        if (room) {
            document.getElementById('roomTitle').textContent = room.name;
            
            // 会議室情報を表示
            if (room.floor) {
                document.getElementById('floor').textContent = room.floor;
            } else {
                // デフォルト値（既存データとの互換性のため）
                const defaultInfo = {
                    1: '3階', 2: '2階', 3: '4階', 4: '1階', 5: '5階'
                };
                document.getElementById('floor').textContent = defaultInfo[roomId] || '3階';
            }
            
            if (room.capacity) {
                document.getElementById('capacity').textContent = room.capacity;
            } else {
                const defaultInfo = {
                    1: '10名', 2: '8名', 3: '15名', 4: '6名', 5: '20名'
                };
                document.getElementById('capacity').textContent = defaultInfo[roomId] || '10名';
            }
            
            if (room.equipment) {
                document.getElementById('equipment').textContent = room.equipment;
            } else {
                const defaultInfo = {
                    1: 'プロジェクター、ホワイトボード、Wi-Fi',
                    2: 'プロジェクター、ホワイトボード',
                    3: 'プロジェクター、ホワイトボード、Wi-Fi、テレビ会議システム',
                    4: 'ホワイトボード、Wi-Fi',
                    5: 'プロジェクター、ホワイトボード、Wi-Fi、テレビ会議システム、マイク'
                };
                document.getElementById('equipment').textContent = defaultInfo[roomId] || 'プロジェクター、ホワイトボード、Wi-Fi';
            }
            
            // 画像を表示
            const imageGallery = document.getElementById('imageGallery');
            if (imageGallery && room.images && room.images.length > 0) {
                imageGallery.innerHTML = '';
                room.images.forEach((imageUrl, index) => {
                    if (index < 3) {
                        const imgDiv = document.createElement('div');
                        imgDiv.className = 'bg-gray-300 rounded-lg aspect-video flex items-center justify-center overflow-hidden';
                        const img = document.createElement('img');
                        img.src = imageUrl;
                        img.alt = `${room.name}の画像${index + 1}`;
                        img.className = 'w-full h-full object-cover';
                        img.onerror = function() {
                            // 画像読み込みエラー時はプレースホルダーを表示
                            this.style.display = 'none';
                            const placeholder = document.createElement('svg');
                            placeholder.className = 'w-24 h-24 text-gray-400';
                            placeholder.setAttribute('fill', 'currentColor');
                            placeholder.setAttribute('viewBox', '0 0 24 24');
                            placeholder.innerHTML = '<path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>';
                            imgDiv.appendChild(placeholder);
                        };
                        imgDiv.appendChild(img);
                        imageGallery.appendChild(imgDiv);
                    }
                });
                // 残りのスロットをプレースホルダーで埋める
                while (imageGallery.children.length < 3) {
                    const placeholderDiv = document.createElement('div');
                    placeholderDiv.className = 'bg-gray-300 rounded-lg aspect-video flex items-center justify-center';
                    placeholderDiv.innerHTML = '<svg class="w-24 h-24 text-gray-400" fill="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>';
                    imageGallery.appendChild(placeholderDiv);
                }
            }
        } else {
            // 会議室が見つからない場合のデフォルト値
            document.getElementById('floor').textContent = '3階';
            document.getElementById('capacity').textContent = '10名';
            document.getElementById('equipment').textContent = 'プロジェクター、ホワイトボード、Wi-Fi';
        }

        // 編集モーダルの要素
        const editRoomModal = document.getElementById('editRoomModal');
        const editRoomForm = document.getElementById('editRoomForm');
        const editRoomName = document.getElementById('editRoomName');
        const cancelEditBtn = document.getElementById('cancelEditBtn');

        // 3点メニューボタン
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');
        const editRoomMenuBtn = document.getElementById('editRoomMenuBtn');
        const deleteRoomMenuBtn = document.getElementById('deleteRoomMenuBtn');

        // メニューボタンをクリック
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('hidden');
        });

        // メニュー外をクリックで閉じる
        document.addEventListener('click', (e) => {
            if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
                menuDropdown.classList.add('hidden');
            }
        });

        // 会議室編集メニューをクリック
        editRoomMenuBtn.addEventListener('click', () => {
            menuDropdown.classList.add('hidden');
            if (room) {
                editRoomName.value = room.name;
                editRoomModal.classList.remove('hidden');
            }
        });

        // 編集モーダル内の削除ボタン
        const deleteRoomInModalBtn = document.getElementById('deleteRoomInModalBtn');
        deleteRoomInModalBtn.addEventListener('click', () => {
            editRoomModal.classList.add('hidden');
            
            // 会議室が5つ以下の場合は削除を制限
            if (rooms.length <= 5) {
                alert('会議室は最低5つ必要です。削除できません。');
                return;
            }
            
            if (confirm('この会議室を削除しますか？削除すると、この会議室の予約もすべて削除されます。')) {
                // 会議室を削除
                rooms = rooms.filter(r => r.id !== roomId);
                localStorage.setItem('rooms', JSON.stringify(rooms));
                
                // この会議室の予約も削除
                let reservations = JSON.parse(localStorage.getItem('reservations') || '[]');
                reservations = reservations.filter(r => r.room !== roomId);
                localStorage.setItem('reservations', JSON.stringify(reservations));
                
                // メインページに戻る
                window.location.href = 'index.html';
            }
        });

        // キャンセルボタン
        cancelEditBtn.addEventListener('click', () => {
            editRoomModal.classList.add('hidden');
        });

        // モーダル外をクリックで閉じる
        editRoomModal.addEventListener('click', (e) => {
            if (e.target === editRoomModal) {
                editRoomModal.classList.add('hidden');
            }
        });

        // 編集フォーム送信
        editRoomForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const newName = editRoomName.value.trim();
            if (newName && room) {
                // 会議室名を更新
                room.name = newName;
                const roomIndex = rooms.findIndex(r => r.id === roomId);
                if (roomIndex !== -1) {
                    rooms[roomIndex] = room;
                    localStorage.setItem('rooms', JSON.stringify(rooms));
                    
                    // タイトルを更新
                    document.getElementById('roomTitle').textContent = newName;
                    
                    // モーダルを閉じる
                    editRoomModal.classList.add('hidden');
                }
            }
        });

        // 会議室削除メニューをクリック
        deleteRoomMenuBtn.addEventListener('click', () => {
            menuDropdown.classList.add('hidden');
            
            // 会議室が5つ以下の場合は削除を制限
            if (rooms.length <= 5) {
                alert('会議室は最低5つ必要です。削除できません。');
                return;
            }
            
            if (confirm('この会議室を削除しますか？削除すると、この会議室の予約もすべて削除されます。')) {
                // 会議室を削除
                rooms = rooms.filter(r => r.id !== roomId);
                localStorage.setItem('rooms', JSON.stringify(rooms));
                
                // この会議室の予約も削除
                let reservations = JSON.parse(localStorage.getItem('reservations') || '[]');
                reservations = reservations.filter(r => r.room !== roomId);
                localStorage.setItem('reservations', JSON.stringify(reservations));
                
                // メインページに戻る
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
